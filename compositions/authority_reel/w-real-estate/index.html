<!-- hyperframes-registry-item: authority-reel-w-real-estate -->
<!doctype html>
<html lang="en" data-composition-variables='[
  {"id":"brand",      "type":"string","label":"Brand ID",       "default":"w-real-estate"},
  {"id":"brand_name", "type":"string","label":"Brand Name",     "default":"W Real Estate, LLC"},
  {"id":"phone",      "type":"string","label":"Phone",          "default":"601-499-0952"},
  {"id":"duration",   "type":"number","label":"Duration (s)",   "default":30},
  {"id":"words",      "type":"string","label":"Words JSON",     "default":"[]"},
  {"id":"broll_path", "type":"string","label":"B-Roll Path",    "default":""},
  {"id":"audio_path", "type":"string","label":"Audio Path",     "default":""},
  {"id":"cta_text",   "type":"string","label":"CTA Text",       "default":"Call W Real Estate, LLC at 601-499-0952 today."}
]'>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;700&display=block" rel="stylesheet" />
  <script src="../../shared/gsap.min.js"></script>
  <script src="../../shared/animations.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #1A0A0A;
    }

    /* ── B-roll background ── */
    #broll {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* ── Brand overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(26,10,10,0.30) 0%,
        rgba(26,10,10,0.48) 40%,
        rgba(26,10,10,0.72) 78%,
        rgba(26,10,10,0.88) 100%
      );
      z-index: 1;
      opacity: 0;
    }

    /* ── Logo (top-left) ── */
    #logo-area {
      position: absolute;
      top: 72px;
      left: 72px;
      z-index: 10;
      opacity: 0;
    }
    #logo-area img {
      height: 80px;
      width: auto;
    }
    #logo-wordmark {
      font-family: "Playfair Display", serif;
      font-size: 28px;
      font-weight: 700;
      color: #C9A84C;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Subtitle container (center-lower) ── */
    #subtitle-container {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 380px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .sub-line {
      text-align: center;
      opacity: 0;
      transform: translateY(14px);
    }

    .sub-word {
      display: inline-block;
      font-family: "Lato", sans-serif;
      font-size: 72px;
      font-weight: 700;
      color: #FFFFFF;
      text-shadow:
        0 2px 12px rgba(0,0,0,0.6),
        0 0 40px rgba(0,0,0,0.4);
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin: 0 6px;
      transform-origin: 50% 100%;
    }

    /* ── Lower-third CTA ── */
    #lower-third {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 320px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 72px 64px;
      background: linear-gradient(180deg, transparent 0%, rgba(139,26,26,0.72) 40%, rgba(139,26,26,0.92) 100%);
      opacity: 0;
    }

    #brand-name {
      font-family: "Playfair Display", serif;
      font-size: 52px;
      font-weight: 900;
      color: #FFFFFF;
      letter-spacing: 0.02em;
      text-align: center;
      opacity: 0;
      transform: translateX(-16px);
    }

    #phone {
      font-family: "Lato", sans-serif;
      font-size: 44px;
      font-weight: 700;
      color: #C9A84C;
      letter-spacing: 0.08em;
      text-align: center;
      margin-top: 12px;
      opacity: 0;
      transform: translateX(-16px);
    }

    #divider {
      width: 80px;
      height: 3px;
      background: #C9A84C;
      margin: 0 auto 20px;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="authority-reel-w-real-estate"
    data-start="0"
    data-duration="30"
    data-width="1080"
    data-height="1920"
    data-fps="30"
  >
    <video id="broll" muted playsinline preload="auto"></video>

    <div id="overlay"></div>

    <div id="logo-area">
      <div id="logo-wordmark">W Real Estate</div>
    </div>

    <div id="subtitle-container"></div>

    <div id="lower-third">
      <div id="divider"></div>
      <div id="brand-name"></div>
      <div id="phone"></div>
    </div>
  </div>

  <script>
    (function () {
      // ── Load variables ─────────────────────────────────────────────────
      var DEFAULT_VARS = {
        words: [],
        duration: 30,
        brand_name: "W Real Estate, LLC",
        phone: "601-499-0952",
        cta_text: "Call W Real Estate, LLC at 601-499-0952 today.",
        broll_path: "",
        audio_path: ""
      };

      var vars = DEFAULT_VARS;
      try {
        if (window.__hyperframes && typeof window.__hyperframes.getVariables === "function") {
          var v = window.__hyperframes.getVariables();
          if (v && typeof v === "object") {
            vars = Object.assign({}, DEFAULT_VARS, v);
            if (typeof vars.words === "string") {
              try { vars.words = JSON.parse(vars.words); } catch (_) { vars.words = []; }
            }
          }
        }
      } catch (e) {
        console.warn("getVariables() error:", e);
      }

      // ── Wire DOM ───────────────────────────────────────────────────────
      document.getElementById("brand-name").textContent = vars.brand_name;
      document.getElementById("phone").textContent      = vars.phone;

      var brollEl = document.getElementById("broll");
      if (vars.broll_path) {
        brollEl.src = vars.broll_path;
        brollEl.loop = true;
      }

      // Update data-duration to match actual audio duration
      if (vars.duration) {
        document.getElementById("root").setAttribute("data-duration", String(vars.duration));
      }

      // ── Build timeline ─────────────────────────────────────────────────
      var tl = buildAuthorityTimeline(vars, {
        subtitleContainer: document.getElementById("subtitle-container"),
        lowerThird:        document.getElementById("lower-third"),
        brandNameEl:       document.getElementById("brand-name"),
        phoneEl:           document.getElementById("phone"),
        overlayEl:         document.getElementById("overlay"),
        logoEl:            document.getElementById("logo-area")
      });

      // ── Register timeline with HyperFrames renderer ───────────────────
      window.__timelines = window.__timelines || {};
      window.__timelines["authority-reel-w-real-estate"] = tl;

      // ── Preview / dev mode (no HyperFrames renderer) ─────────────────
      if (!window.__player) {
        tl.play(0);
        if (brollEl.src) { brollEl.play().catch(function() {}); }
      }
    })();
  </script>
</body>
</html>
